<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Países del Mundo</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1e2a38 0%, #2d4a6b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    footer {
  margin-top: 40px;
  text-align: center;
  color: #94a3b8;
  font-size: 0.9rem;
}

    .hero {
      text-align: center;
      padding: 2rem;
    }

    .hero-emoji {
      font-size: 5rem;
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 1.2rem;
      color: #94a3b8;
      margin-bottom: 2.5rem;
    }

    .btn-entrar {
      display: inline-block;
      background-color: #3b82f6;
      color: white;
      text-decoration: none;
      padding: 1rem 2.5rem;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      transition: background-color 0.2s, transform 0.2s;
    }

    .btn-entrar:hover {
      background-color: #2563eb;
      transform: translateY(-2px);
    }

    .stats {
      margin-top: 3rem;
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat .numero {
      font-size: 2rem;
      font-weight: 700;
      color: #3b82f6;
    }

    .stat .label {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-emoji">🌎</div>
    <h1>Selecciones Mundial 2026</h1>
    <p>Explorá información de todos los países que jugaron la copa del mundo y su participación en el Mundial 2026</p>
    <a href="/src/pages/countries/index.html" class="btn-entrar">Explorar países →</a>
    
    <div class="stats">
      <div class="stat">
        <div class="numero">81</div>
        <div class="label">selecciones</div>
      </div>
      <div class="stat">
        <div class="numero">48</div>
        <div class="label">Clasificados al Mundial 2026</div>
      </div>
      <div class="stat">
        <div class="numero">5</div>
        <div class="label">continentes del mundo</div>
      </div>
    </div>
    <footer>
  <p>Desarrollado con HTML, CSS, JavaScript, Vite y CountriesNow API</p>
</footer>
  </div>
</body>
</html>
